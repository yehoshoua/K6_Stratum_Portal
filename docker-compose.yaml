version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: k6-stratum-portal-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/data/dashboard.db
      - JWT_SECRET=supersecretjwtsecretkeyshouldbechangedinprod123!
      - ENCRYPTION_KEY=dGhpcy1pcy1hLTMyLWJ5dGUtZGV2ZWxvcG1lbnQta2V5MSE=
    volumes:
      - backend-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: k6-stratum-portal-frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    container_name: k6-stratum-portal-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
